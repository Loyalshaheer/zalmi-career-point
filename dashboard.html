<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Zalmi Career Point Student Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+Urdu:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="dashboard-page">

    <!-- Mobile Header (Visible on Mobile Only) -->
    <div class="mobile-dashboard-header">
        <div class="mobile-logo">
            <img src="assets/logo.png" alt="ZCP">
            <span class="zcp-text">ZCP</span>
        </div>
        <button id="sidebarToggle" class="menu-btn">
            <i class="fas fa-bars"></i>
        </button>
    </div>

    <!-- Sidebar Navigation -->
    <aside class="sidebar glass-card" id="mainSidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo-zcp">
                <img src="assets/logo.png" alt="ZCP Logo" class="logo-img">
                <div class="zcp-text-group">
                    <span class="zcp-main-text">ZALMI</span>
                    <span class="zcp-sub-text">CAREER POINT</span>
                </div>
            </a>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li class="nav-item active">
                    <a href="#" data-section="overview">
                        <i class="fas fa-th-large"></i> <span>My Programs</span>
                    </a>
                </li>
                <li class="nav-item admin-only" id="admin-portal-tab" style="display: none;">
                    <a href="admin.html">
                        <i class="fas fa-user-shield"></i> <span>Admin Console</span>
                    </a>
                </li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <button id="logoutBtn" class="btn btn-logout-sidebar">
                <span>LOGOUT</span> <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="dashboard-main">
        <!-- Dashboard Top Header -->
        <header class="dashboard-header-premium">
            <div class="header-left">
                <h2>Welcome, <span id="userName" class="text-gradient">Student</span>!</h2>
                <p id="userRoll" style="color: var(--text-muted); font-size: 0.9rem; margin-top: 4px;"></p>
            </div>
            <div class="header-right">
                <div class="user-meta">
                    <strong id="displayFullName"></strong>
                </div>
                <div class="user-avatar-circle">
                    <i class="fas fa-user-graduate"></i>
                </div>
            </div>
        </header>

        <!-- My Programs Section -->
        <div id="overview-section" class="dash-section active">
            <div id="coursesContainer" class="dashboard-courses-list">
                <!-- Dynamic Course Cards (Loaded by JS) -->
                <div class="loading-state" style="grid-column: 1/-1; text-align: center; padding: 4rem; opacity: 0.5;">
                    <i class="fas fa-circle-notch fa-spin" style="font-size: 2rem; display: block; margin-bottom: 1rem;"></i>
                    <p>Loading your programs...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Sidebar Mobile Overlay -->
    <div class="sidebar-mask" id="sidebarMask"></div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="script.js"></script>
</body>

</html>
